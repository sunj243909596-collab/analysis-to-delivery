name: description-lint

# 校验 skills/ 下所有 SKILL.md 的 frontmatter description: 字段长度
# 必须在 [80, 150] 字符范围内,且不能过于空泛。

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/description-lint.py'
      - '.github/workflows/description-lint.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Self-test
        run: python3 scripts/description-lint.py --self-test

      - name: Run pytest
        run: |
          pip install pytest
          pytest tests/test_description_lint.py -v

      - name: Lint real skills/
        run: python3 scripts/description-lint.py --strict skills/

      - name: Break-on-modify smoke
        run: |
          set -e
          F="skills/ask-delivery/SKILL.md"
          BACKUP="$(mktemp)"
          cp "$F" "$BACKUP"
          # 故意把 description 改成 < 80 字(超短)
          sed -i 's/^description:.*/description: 太短/' "$F"
          # 跑应 exit 1
          if python3 scripts/description-lint.py --strict skills/; then
            echo "❌ 应 exit 1 但通过"
            cp "$BACKUP" "$F"
            exit 1
          fi
          echo "✅ 故意改坏后正确 exit 1"
          cp "$BACKUP" "$F"

      - name: JSON output sanity
        run: |
          python3 scripts/description-lint.py --strict --json skills/ > /tmp/desc.json
          python3 -c "import json,sys; d=json.load(open('/tmp/desc.json')); assert 'checks' in d; assert isinstance(d['checks'], list); print('JSON shape OK,', len(d['checks']), 'checks')"