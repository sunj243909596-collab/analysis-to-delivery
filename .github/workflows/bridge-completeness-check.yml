name: bridge-completeness-check

# 校验 7 个 bridge skill 是否含降级方案(superpowers 未装时也能用)

on:
  pull_request:
    paths:
      - 'skills/orchestration/development/**'
      - 'scripts/bridge-completeness-check.py'
      - '.github/workflows/bridge-completeness-check.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Self-test
        run: python3 scripts/bridge-completeness-check.py --self-test

      - name: Run pytest
        run: |
          pip install pytest
          pytest tests/test_bridge_completeness.py -v

      - name: Lint real bridges
        run: python3 scripts/bridge-completeness-check.py --strict

      - name: Break-on-modify smoke
        run: |
          set -e
          F="skills/orchestration/development/brainstorming/SKILL.md"
          BACKUP="$(mktemp)"
          cp "$F" "$BACKUP"
          TARGET="$F"
          python3 -c "import pathlib,sys; p=pathlib.Path(sys.argv[1]); t=p.read_text(); p.write_text(t.split('## 降级方案')[0])" "$TARGET"
          if python3 scripts/bridge-completeness-check.py --strict; then
            echo "❌ 应 exit 1 但通过"
            cp "$BACKUP" "$F"
            exit 1
          fi
          echo "✅ 故意删降级章节后正确 exit 1"
          cp "$BACKUP" "$F"

      - name: JSON output sanity
        run: |
          python3 scripts/bridge-completeness-check.py --strict --json > /tmp/bc.json
          python3 -c "import json; d=json.load(open('/tmp/bc.json')); assert 'checks' in d; print('JSON OK,', len(d['checks']), 'checks')"