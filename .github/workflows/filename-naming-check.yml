name: filename-naming-check

# 校验 examples/ 下文件命名符合规范
# 禁止 `config-used.md`(已 v3.1.0 改名为 decisions.md)

on:
  pull_request:
    paths:
      - 'examples/**'
      - 'scripts/filename-naming-check.py'
      - 'tests/test_filename_naming.py'
      - '.github/workflows/filename-naming-check.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Self-test
        run: python3 scripts/filename-naming-check.py --self-test

      - name: Run pytest
        run: |
          pip install pytest
          pytest tests/test_filename_naming.py -v

      - name: Lint real examples/
        run: python3 scripts/filename-naming-check.py --strict examples/

      - name: Break-on-modify smoke
        run: |
          set -e
          F="examples/01-wms-warehouse/decisions.md"
          BACKUP="$(mktemp)"
          cp "$F" "$BACKUP"
          # 故意把 decisions.md 改回 config-used.md
          mv "$F" "$(dirname $F)/config-used.md"
          # 跑应 exit 1
          if python3 scripts/filename-naming-check.py --strict examples/; then
            echo "❌ 应 exit 1 但通过"
            mv "$(dirname $F)/config-used.md" "$F"
            exit 1
          fi
          echo "✅ 故意改坏后正确 exit 1"
          mv "$(dirname $F)/config-used.md" "$F"

      - name: JSON output sanity
        run: |
          python3 scripts/filename-naming-check.py --strict --json examples/ > /tmp/fname.json
          python3 -c "import json,sys; d=json.load(open('/tmp/fname.json')); assert 'checks' in d; assert isinstance(d['checks'], list); print('JSON shape OK,', len(d['checks']), 'checks')"
