name: Field Alignment Check

# 验证字段对齐
# - 严禁猜测 WMOS 字段名(必须查知识库)
# - 严禁自创字段(状态码 / 审计字段 / 业务字段)
# - 多租户字段每张表必带 tenant_id
# - 审计字段五件套必带
# - 货币字段用 NUMERIC,不用 FLOAT

on:
  push:
    branches: [main, develop]
    paths:
      - 'examples/**'
      - 'scripts/field-alignment-check.py'
      - '.github/workflows/field-alignment-check.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'examples/**'
      - 'scripts/field-alignment-check.py'
  workflow_dispatch:

concurrency:
  group: field-alignment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  field-alignment:
    name: 字段对齐审计
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 校验字段对齐
        run: |
          python3 scripts/field-alignment-check.py "examples/**/*.md"

      - name: 校验 WMS 字段映射(知识库对照)
        run: |
          # 如果引用 WMOS 字段,必须对照知识库
          python3 scripts/field-alignment-check.py "examples/01-wms-warehouse/**/*.md" --strict

      - name: 校验 SaaS 多租户字段
        run: |
          # SaaS 项目必须每张表带 tenant_id
          python3 scripts/field-alignment-check.py "examples/02-saas-dashboard/**/*.md" --require=tenant_id

      - name: 校验 Mobile App 字段类型
        run: |
          # 移动 App 积分字段必须为整数(number/int64),禁止浮点
          python3 scripts/field-alignment-check.py "examples/03-mobile-app/**/*.md" --require=int64-points

      - name: 上传审计报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: field-alignment-report
          path: field-alignment-report.txt
          if-no-files-found: ignore
          retention-days: 7